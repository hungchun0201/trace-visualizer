<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trace Visualizer — Claude Code DAG</title>
    <meta name="description" content="Visualize Claude Code JSONL traces as a DAG with context overlap analysis">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=6">
</head>

<body>
    <div id="app">
        <!-- Upload Screen -->
        <div id="upload-screen" class="screen active">
            <div class="upload-container">
                <div class="upload-logo">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                        <path d="M24 4L6 14v20l18 10 18-10V14L24 4z" stroke="url(#grad1)" stroke-width="2"
                            fill="none" />
                        <path d="M24 14l-10 6v12l10 6 10-6V20L24 14z" stroke="url(#grad1)" stroke-width="1.5"
                            fill="rgba(139,92,246,0.1)" />
                        <circle cx="24" cy="24" r="3" fill="url(#grad1)" />
                        <defs>
                            <linearGradient id="grad1" x1="6" y1="4" x2="42" y2="44">
                                <stop offset="0%" stop-color="#8B5CF6" />
                                <stop offset="100%" stop-color="#06B6D4" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="upload-title">Trace Visualizer</h1>
                <p class="upload-subtitle">Upload a JSONL trace file or paste raw trace data</p>
                <div id="drop-zone" class="drop-zone" tabindex="0" role="button"
                    aria-label="Click or drag file to upload">
                    <div class="drop-zone-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" y1="3" x2="12" y2="15" />
                        </svg>
                    </div>
                    <span class="drop-zone-text">Drop .jsonl file here or click to browse</span>
                    <input type="file" id="file-input" accept=".jsonl,.json" hidden>
                </div>
                <div class="upload-divider"><span>or paste trace data</span></div>
                <div class="paste-area">
                    <textarea id="paste-input" placeholder="Paste JSONL or JSON trace content here..."></textarea>
                    <button id="btn-paste" class="btn-paste">Visualize Pasted Trace</button>
                </div>
                <div class="upload-divider"><span>or</span></div>
                <button id="btn-default" class="btn-default">Load Default Trace</button>
            </div>
        </div>

        <!-- Main Visualization Screen -->
        <div id="main-screen" class="screen">
            <!-- Top Bar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button id="btn-back" class="icon-btn" title="Load another file">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="15 18 9 12 15 6" />
                        </svg>
                    </button>
                    <h2 class="topbar-title">Trace Visualizer</h2>
                    <span id="live-badge" class="live-badge" style="display:none">LIVE</span>
                </div>
                <div class="topbar-center">
                    <input type="password" id="api-key-input" class="api-key-input"
                        placeholder="Anthropic API Key (optional)" title="Provide API key for accurate token counting">
                </div>
                <div class="topbar-right">
                    <span id="file-info" class="file-info"></span>
                </div>
            </header>
            <!-- Cost Banner -->
            <div id="cost-banner" class="cost-banner" style="display:none"></div>

            <!-- Content Area -->
            <div class="content">
                <!-- Left Panel: DAG -->
                <div class="panel panel-left" id="panel-left">
                    <div class="panel-header">
                        <h3>Request Flow</h3>
                        <div class="zoom-controls">
                            <button class="zoom-btn" id="zoom-out" title="Zoom out">-</button>
                            <span id="zoom-level" class="zoom-label">100%</span>
                            <button class="zoom-btn" id="zoom-in" title="Zoom in">+</button>
                            <button class="zoom-btn" id="zoom-reset" title="Reset zoom">&#x27F2;</button>
                        </div>
                        <span id="node-count" class="badge">0 requests</span>
                    </div>
                    <div class="dag-container" id="dag-container">
                        <svg id="dag-svg" class="dag-svg"></svg>
                    </div>
                </div>

                <!-- Resize Handle -->
                <div class="resize-handle" id="resize-handle">
                    <div class="resize-dots"></div>
                </div>

                <!-- Right Panel: Detail -->
                <div class="panel panel-right" id="panel-right">
                    <div class="panel-header">
                        <h3 id="detail-title">Select a request node</h3>
                    </div>
                    <div id="detail-meta" class="detail-meta-area"></div>
                    <div id="detail-content" class="detail-content">
                        <div class="detail-placeholder">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1" opacity="0.3">
                                <rect x="3" y="3" width="18" height="18" rx="2" />
                                <line x1="9" y1="9" x2="15" y2="9" />
                                <line x1="9" y1="13" x2="15" y2="13" />
                                <line x1="9" y1="17" x2="12" y2="17" />
                            </svg>
                            <p>Click a node in the DAG to view its input and output</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="pricing.js?v=6"></script>
    <script src="dag.js?v=25"></script>
    <script src="app.js?v=30"></script>
</body>

</html>
